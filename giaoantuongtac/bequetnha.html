<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Quét Nhà</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --cream: #f5f0e8;
            --parchment: #ede5d0;
            --ink: #1a1209;
            --sepia: #6b4f2a;
            --gold: #c8922a;
            --gold-light: #e8b84b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Cormorant Garamond', serif;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(120, 90, 40, 0.04) 24px, rgba(120, 90, 40, 0.04) 25px),
                radial-gradient(ellipse at 20% 20%, rgba(200, 146, 42, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 980px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeDown 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .header-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .ornament-line {
            height: 1px;
            width: 80px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }

        .ornament-diamond {
            width: 7px;
            height: 7px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-style: italic;
            color: var(--ink);
            letter-spacing: 0.03em;
            line-height: 1.4;
        }

        .header .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 10px;
            padding: 0 4px;
        }

        .header .meta-left {
            font-size: 0.88rem;
            color: var(--sepia);
            font-style: italic;
            text-align: left;
        }

        .header .meta-right {
            font-size: 0.88rem;
            color: var(--sepia);
            font-style: italic;
            text-align: right;
        }

        /* ── Score card ── */
        .score-card {
            background: var(--parchment);
            border: 1px solid rgba(120, 90, 40, 0.25);
            border-radius: 2px;
            box-shadow: 0 2px 0 rgba(200, 146, 42, 0.15), 0 8px 40px rgba(26, 18, 9, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            padding: 36px 24px 32px;
            position: relative;
            animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
        }

        .score-card::before,
        .score-card::after {
            content: '✦';
            position: absolute;
            font-size: 11px;
            color: var(--gold);
            opacity: 0.7;
        }

        .score-card::before { top: 10px; left: 14px; }
        .score-card::after  { top: 10px; right: 14px; }

        #score {
            width: 100%;
            overflow-x: auto;
        }

        #score svg {
            display: block;
            width: 100%;
        }

        /* ── Instrument selector ── */
        .controls {
            margin-top: 28px;
            padding-top: 22px;
            border-top: 1px solid rgba(120, 90, 40, 0.18);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
        }

        .instrument-label {
            font-size: 0.78rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--sepia);
        }

        .instrument-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .inst-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 20px;
            border: 1.5px solid rgba(120, 90, 40, 0.3);
            border-radius: 2px;
            background: transparent;
            color: var(--sepia);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .inst-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .inst-btn:hover::before { opacity: 0.08; }

        .inst-btn.active {
            border-color: var(--gold);
            color: var(--ink);
            background: rgba(200, 146, 42, 0.1);
            box-shadow: 0 0 0 1px rgba(200, 146, 42, 0.3);
        }

        .inst-btn .icon { font-size: 1.15rem; position: relative; z-index: 1; }
        .inst-btn span  { position: relative; z-index: 1; }

        /* ── Play button ── */
        .play-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .play-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 32px;
            background: var(--gold);
            border: none;
            border-radius: 2px;
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(200, 146, 42, 0.35);
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            background: var(--gold-light);
            box-shadow: 0 4px 20px rgba(200, 146, 42, 0.5);
            transform: translateY(-1px);
        }

        .play-btn:active  { transform: translateY(0); }
        .play-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .play-btn .play-icon { font-size: 1.1rem; }

        .stop-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 24px;
            background: transparent;
            border: 1.5px solid rgba(120, 90, 40, 0.35);
            border-radius: 2px;
            color: var(--sepia);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .stop-btn:hover {
            border-color: var(--rust, #8b3a1a);
            color: var(--rust, #8b3a1a);
            background: rgba(139, 58, 26, 0.05);
        }

        .stop-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-text {
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--sepia);
            min-width: 120px;
            text-align: center;
            opacity: 0.7;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(107, 79, 42, 0.5);
            animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
        }

        .error-msg {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 16px 20px;
            color: #856404;
            font-family: monospace;
            font-size: 0.82rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="page">
        <header class="header">
            <div class="header-ornament">
                <div class="ornament-line"></div>
                <div class="ornament-diamond"></div>
                <div class="ornament-line"></div>
            </div>
            <h1>Bé Quét Nhà</h1>
            <div class="meta-row">
                <div class="meta-left">Rhythm: Chachacha<br>Tone: Clarinet</div>
                <div class="meta-right">Nhạc và lời : Hà Đức Hậu</div>
            </div>
        </header>

        <div class="score-card">
            <div id="score"></div>

            <!-- Playback controls -->
            <div class="controls">
                <div class="instrument-label">Chọn nhạc cụ</div>
                <div class="instrument-buttons">
                    <button class="inst-btn active" data-inst="piano"><span class="icon">🎹</span><span>Piano</span></button>
                    <button class="inst-btn" data-inst="violin"><span class="icon">🎻</span><span>Violin</span></button>
                    <button class="inst-btn" data-inst="guitar"><span class="icon">🎸</span><span>Guitar</span></button>
                    <button class="inst-btn" data-inst="cello"><span class="icon">🎻</span><span>Cello</span></button>
                    <button class="inst-btn" data-inst="vocal"><span class="icon">🎤</span><span>Vocal</span></button>
                </div>
                <div class="play-row">
                    <button class="play-btn" id="playBtn"><span class="play-icon">▶</span> Phát nhạc</button>
                    <button class="stop-btn" id="stopBtn" disabled>■ Dừng</button>
                    <span class="status-text" id="statusText">Sẵn sàng</span>
                </div>
            </div>
        </div>
        <p class="footer">Bé Quét Nhà · Hà Đức Hậu · Chachacha ♩ = 129</p>
    </div>

    <script>
        // ─────────────────────────────────────────────
        // 1. RENDER SCORE — Bé Quét Nhà
        // Key: F major (1 flat, Bb) | Time: 2/8 | Tempo: 129
        //
        // Melody transcribed from score image:
        // Row 1 (Dm chord area):
        //   Bar 1 (pickup/anacrusis): [A4 8th]
        //   Bar 2: [D5 8th, C5 8th, A4 8th, F4 8th]  → "Một sợi rơm vàng"  (repeat sign)
        //   Bar 3: [D5 8th, C5 8th, A4 8th, F4 8th]  → same
        //   F-Dm: [A4 8th, C5 8th | D5 8th, A4 8th]  → "là hai sợi vàng rơm. Bà bện chổi"
        // Row 2 (C - Dm - Gm):
        //   [G4 8th, G4 8th, A4 8th, Bb4 8th]          → "to bà làm chổi"
        //   [C5 8th, A4 8th (tie), A4 8th, C5 8th]     → "nhỏ. Chổi to"
        //   [D5 8th, C5 8th, A4 8th, G4 8th]            → "chổi"
        // Row 3 (Dm):
        //   [F4 8th, G4 8th, A4 8th, C5 8th]            → "to bà quét sân"
        //   [A4 16th, Bb4 16th, A4 8th, G4 8th, F4 8th] → "kho ấy còn chổi nhỏ"
        //   [E4 8th, F4 8th]                              → "bà để"
        // Row 4 (C - F endings):
        //   [G4 8th, A4 8th, C5 16th, D5 16th]           → "dành bé chăm lo"
        //   1st ending: [C5 dotted 8th, A4 16th]          → "quét nhà"
        //   2nd ending: [C5 dotted 8th, rest]              → "nhà."
        // ─────────────────────────────────────────────
        window.addEventListener("load", function () {
            const scoreDiv = document.getElementById("score");
            try {
                const {
                    Renderer, Stave, StaveNote, Voice, Formatter,
                    Annotation, Accidental, Beam, BarlineType, Dot,
                    StaveTie, Tuplet, TextNote, Repetition, Volta
                } = Vex.Flow;

                const SVG_W = 940;
                const STAVE_H = 160;
                const ROWS = 4;
                const SVG_H = STAVE_H * ROWS + 60;
                const LEFT = 10;
                const USABLE = SVG_W - LEFT * 2;

                const renderer = new Renderer(scoreDiv, Renderer.Backends.SVG);
                renderer.resize(SVG_W, SVG_H);
                const ctx = renderer.getContext();
                ctx.setFillStyle("#1a1209");
                ctx.setStrokeStyle("#1a1209");

                // Helper: create StaveNote with optional accidental and lyric annotation
                function n(keys, dur, lyric, acc, dotted) {
                    const sn = new StaveNote({ keys, duration: dur + (dotted ? "d" : "") });
                    if (acc) sn.addModifier(new Accidental(acc), 0);
                    if (lyric) {
                        sn.addModifier(
                            new Annotation(lyric)
                                .setFont("Georgia", 10)
                                .setVerticalJustification(Annotation.VerticalJustify.BOTTOM),
                            0
                        );
                    }
                    if (dotted) Dot.buildAndAttach([sn]);
                    return sn;
                }

                function rest(dur) {
                    return new StaveNote({ keys: ["b/4"], duration: dur + "r" });
                }

                // Draw a stave row
                function makeStave(row, x, w, clef, timeSig, keySig, endBar) {
                    const y = 30 + row * STAVE_H;
                    const stave = new Stave(x, y, w);
                    if (clef)    stave.addClef(clef);
                    if (keySig)  stave.addKeySignature(keySig);
                    if (timeSig) stave.addTimeSignature(timeSig);
                    if (endBar) {
                        try { stave.setEndBarType(BarlineType.DOUBLE); } catch(e) {}
                    }
                    stave.setContext(ctx).draw();
                    return stave;
                }

                // Draw chord label above stave
                function chordLabel(text, x, stave) {
                    ctx.save();
                    ctx.setFont("Georgia", 12, "italic");
                    ctx.setFillStyle("#1a1209");
                    ctx.fillText(text, x, stave.getYForLine(0) - 14);
                    ctx.restore();
                }

                // Draw tempo mark
                function tempoMark(stave) {
                    ctx.save();
                    ctx.setFont("Georgia", 11, "normal");
                    ctx.setFillStyle("#1a1209");
                    ctx.fillText("♩= 129", LEFT + 80, stave.getYForLine(0) - 14);
                    ctx.restore();
                }

                // Draw bar line at position x
                function barLine(x, stave) {
                    ctx.beginPath();
                    ctx.moveTo(x, stave.getYForLine(0));
                    ctx.lineTo(x, stave.getYForLine(4));
                    ctx.setLineWidth(1.2);
                    ctx.stroke();
                }

                // Draw repeat sign (start or end)
                function repeatDots(x, stave, isStart) {
                    const y0 = stave.getYForLine(1) + 2;
                    const y1 = stave.getYForLine(2) + 2;
                    const r = 2.5;
                    const dx = isStart ? 8 : -8;
                    ctx.beginPath(); ctx.arc(x + dx, y0, r, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(x + dx, y1, r, 0, Math.PI * 2); ctx.fill();
                    // thick bar
                    ctx.beginPath();
                    ctx.moveTo(x, stave.getYForLine(0));
                    ctx.lineTo(x, stave.getYForLine(4));
                    ctx.setLineWidth(3);
                    ctx.stroke();
                    ctx.setLineWidth(1);
                    // thin bar
                    const offset = isStart ? 4 : -4;
                    ctx.beginPath();
                    ctx.moveTo(x + offset, stave.getYForLine(0));
                    ctx.lineTo(x + offset, stave.getYForLine(4));
                    ctx.setLineWidth(1);
                    ctx.stroke();
                }

                // ── ROW 0: anacrusis + bars 1-2 ──────────────────
                // Full row stave with clef, key (F), time (2/8)
                const row0 = makeStave(0, LEFT, USABLE, "treble", "2/8", "F");
                tempoMark(row0);
                chordLabel("Dm", LEFT + 180, row0);
                chordLabel("F", LEFT + 550, row0);
                chordLabel("Dm", LEFT + 690, row0);

                // Pickup bar: single 8th A4
                // Then repeat-sign bars: [D5 C5 A4 F4] x2, then [A4 C5 | D5 A4]
                const pickup = [n(["a/4"], "8", "Một")];
                // bar1 (inside repeat): D5 C5 A4 F4
                const bar1 = [
                    n(["d/5"], "8", "sợi"),
                    n(["c/5"], "8", "rơm"),
                    n(["a/4"], "8", "vàng"),
                    n(["f/4"], "8", "là"),
                ];
                // bar2 (inside repeat): hai sợi vàng rơm
                const bar2 = [
                    n(["d/5"], "8", "hai"),
                    n(["c/5"], "8", "sợi"),
                    n(["a/4"], "8", "vàng"),
                    n(["f/4"], "8", "rơm."),
                ];
                // bar3: Bà bện chổi
                const bar3 = [
                    n(["a/4"], "8", "Bà"),
                    n(["c/5"], "8", "bện"),
                    n(["d/5"], "8", "chổi"),
                    n(["a/4"], "8", "—"),
                ];

                const all0 = [...pickup, ...bar1, ...bar2, ...bar3];
                const voice0 = new Voice({ num_beats: 13, beat_value: 8 });
                voice0.setMode(Voice.Mode.SOFT);
                voice0.addTickables(all0);
                new Formatter().joinVoices([voice0]).format([voice0], USABLE - 180);
                voice0.draw(ctx, row0);

                // beam groups of 2 within each bar
                function beam2(notes) { try { return new Beam(notes).setContext(ctx).draw(); } catch(e){} }
                beam2([bar1[0], bar1[1]]); beam2([bar1[2], bar1[3]]);
                beam2([bar2[0], bar2[1]]); beam2([bar2[2], bar2[3]]);
                beam2([bar3[0], bar3[1]]); beam2([bar3[2], bar3[3]]);

                // Barlines
                const bx_pickup = pickup[0].getAbsoluteX() + pickup[0].getWidth() + 14;
                barLine(bx_pickup, row0);
                const bx_b1 = bar1[3].getAbsoluteX() + bar1[3].getWidth() + 12;
                repeatDots(bx_b1, row0, false); // repeat start back
                // repeat start forward (before bar2)
                const bx_b2 = bar2[3].getAbsoluteX() + bar2[3].getWidth() + 12;
                barLine(bx_b2, row0);
                // barline after bar3
                const bx_b3 = bar3[3].getAbsoluteX() + bar3[3].getWidth() + 12;
                barLine(bx_b3, row0);

                // ── ROW 1: bars 4-6 ──────────────────────────────
                const row1 = makeStave(1, LEFT, USABLE, "treble", null, "F");
                chordLabel("C", LEFT + 60, row1);
                chordLabel("Dm", LEFT + 340, row1);
                chordLabel("Gm", LEFT + 570, row1);

                // bar4: to bà làm chổi  (G4 G4 A4 Bb4)
                const bar4 = [
                    n(["g/4"], "8", "to"),
                    n(["g/4"], "8", "bà"),
                    n(["a/4"], "8", "làm"),
                    n(["b/4"], "8", "chổi", "b"),
                ];
                // bar5: nhỏ. Chổi to  (C5 A4 tie, A4 C5)
                const bar5a = n(["c/5"], "8", "nhỏ.");
                const bar5b = n(["a/4"], "8", "");
                const bar5c = n(["a/4"], "8", "Chổi");
                const bar5d = n(["c/5"], "8", "to");
                const bar5 = [bar5a, bar5b, bar5c, bar5d];
                // bar6: chổi (D5 C5 A4 G4)
                const bar6 = [
                    n(["d/5"], "8", "chổi"),
                    n(["c/5"], "8", "—"),
                    n(["a/4"], "8", ""),
                    n(["g/4"], "8", ""),
                ];

                const all1 = [...bar4, ...bar5, ...bar6];
                const voice1 = new Voice({ num_beats: 12, beat_value: 8 });
                voice1.setMode(Voice.Mode.SOFT);
                voice1.addTickables(all1);
                new Formatter().joinVoices([voice1]).format([voice1], USABLE - 120);
                voice1.draw(ctx, row1);

                beam2([bar4[0], bar4[1]]); beam2([bar4[2], bar4[3]]);
                beam2([bar5[0], bar5[1]]); beam2([bar5[2], bar5[3]]);
                beam2([bar6[0], bar6[1]]); beam2([bar6[2], bar6[3]]);

                // Tie bar5b–bar5c
                try {
                    new StaveTie({ first_note: bar5b, last_note: bar5c, first_indices: [0], last_indices: [0] })
                        .setContext(ctx).draw();
                } catch(e) {}

                const bx1_b4 = bar4[3].getAbsoluteX() + bar4[3].getWidth() + 12;
                barLine(bx1_b4, row1);
                const bx1_b5 = bar5[3].getAbsoluteX() + bar5[3].getWidth() + 12;
                barLine(bx1_b5, row1);
                const bx1_b6 = bar6[3].getAbsoluteX() + bar6[3].getWidth() + 12;
                barLine(bx1_b6, row1);

                // ── ROW 2: bars 7-9 ──────────────────────────────
                const row2 = makeStave(2, LEFT, USABLE, "treble", null, "F");
                chordLabel("Dm", LEFT + 430, row2);

                // bar7: to bà quét sân (F4 G4 A4 C5)
                const bar7 = [
                    n(["f/4"], "8", "to"),
                    n(["g/4"], "8", "bà"),
                    n(["a/4"], "8", "quét"),
                    n(["c/5"], "8", "sân"),
                ];
                // bar8: kho ấy còn chổi nhỏ bà để (A4 16th Bb4 16th A4 G4 F4 E4)
                const bar8 = [
                    n(["a/4"], "16", "kho"),
                    n(["b/4"], "16", "ấy", "b"),
                    n(["a/4"], "8", "còn"),
                    n(["g/4"], "8", "chổi"),
                    n(["f/4"], "8", "nhỏ"),
                    n(["e/4"], "8", "bà"),
                ];
                // bar9 continues: để dành (F4 G4 )
                const bar9 = [
                    n(["f/4"], "8", "để"),
                    n(["g/4"], "8", "dành"),
                ];

                const all2 = [...bar7, ...bar8, ...bar9];
                const voice2 = new Voice({ num_beats: 12, beat_value: 8 });
                voice2.setMode(Voice.Mode.SOFT);
                voice2.addTickables(all2);
                new Formatter().joinVoices([voice2]).format([voice2], USABLE - 120);
                voice2.draw(ctx, row2);

                beam2([bar7[0], bar7[1]]); beam2([bar7[2], bar7[3]]);
                try { new Beam([bar8[0], bar8[1]]).setContext(ctx).draw(); } catch(e) {}
                beam2([bar8[2], bar8[3]]); beam2([bar8[4], bar8[5]]);
                beam2([bar9[0], bar9[1]]);

                const bx2_b7 = bar7[3].getAbsoluteX() + bar7[3].getWidth() + 12;
                barLine(bx2_b7, row2);
                const bx2_b8 = bar8[5].getAbsoluteX() + bar8[5].getWidth() + 12;
                barLine(bx2_b8, row2);
                const bx2_b9 = bar9[1].getAbsoluteX() + bar9[1].getWidth() + 12;
                barLine(bx2_b9, row2);

                // ── ROW 3: bars 10-11 with volta (1st/2nd endings) ──
                const row3 = makeStave(3, LEFT, USABLE, "treble", null, "F", true);
                chordLabel("C", LEFT + 60, row3);
                chordLabel("F", LEFT + 430, row3);
                chordLabel("F", LEFT + 700, row3);

                // bar10: bé chăm lo quét (A4 C5 16th D5 16th)
                const bar10 = [
                    n(["a/4"], "8", "bé"),
                    n(["c/5"], "8", "chăm"),
                    n(["c/5"], "16", "lo"),
                    n(["d/5"], "16", "quét"),
                ];
                // 1st ending: nhà (C5 dotted 8th A4 16th)
                const end1a = n(["c/5"], "8", "nhà", null, true);
                const end1b = n(["a/4"], "16", "");
                // 2nd ending: nhà. (C5 dotted 8th rest)
                const end2a = n(["c/5"], "8", "nhà.", null, true);
                const end2b = rest("16");

                const all3 = [...bar10, end1a, end1b, end2a, end2b];
                const voice3 = new Voice({ num_beats: 10, beat_value: 8 });
                voice3.setMode(Voice.Mode.SOFT);
                voice3.addTickables(all3);
                new Formatter().joinVoices([voice3]).format([voice3], USABLE - 120);
                voice3.draw(ctx, row3);

                beam2([bar10[0], bar10[1]]);
                try { new Beam([bar10[2], bar10[3]]).setContext(ctx).draw(); } catch(e) {}

                // barline after bar10
                const bx3_b10 = bar10[3].getAbsoluteX() + bar10[3].getWidth() + 12;
                barLine(bx3_b10, row3);

                // Draw volta brackets manually
                function voltaBracket(label, x1, x2, stave) {
                    const vy = stave.getYForLine(0) - 18;
                    ctx.save();
                    ctx.setLineWidth(1.5);
                    ctx.beginPath();
                    ctx.moveTo(x1, vy + 18);
                    ctx.lineTo(x1, vy);
                    ctx.lineTo(x2, vy);
                    if (label === "1.") {
                        ctx.lineTo(x2, vy + 18); // closed right
                    }
                    ctx.stroke();
                    ctx.setFont("Georgia", 11, "normal");
                    ctx.setFillStyle("#1a1209");
                    ctx.fillText(label, x1 + 5, vy + 13);
                    ctx.restore();
                }

                const volta1_x1 = bx3_b10;
                const volta1_x2 = end1b.getAbsoluteX() + end1b.getWidth() + 14;
                const volta2_x1 = volta1_x2;
                const volta2_x2 = SVG_W - LEFT - 2;

                voltaBracket("1.", volta1_x1, volta1_x2, row3);
                voltaBracket("2.", volta2_x1, volta2_x2, row3);

                // repeat sign before volta 2 end
                repeatDots(volta1_x2, row3, false);

                // ── Recolor all SVG elements to ink ──────────────
                const svg = scoreDiv.querySelector("svg");
                if (svg) {
                    svg.querySelectorAll("path,rect,circle,ellipse,polygon,line,text").forEach(el => {
                        const fill   = el.getAttribute("fill");
                        const stroke = el.getAttribute("stroke");
                        if (fill && fill !== "none" && fill.toLowerCase() !== "#ffffff" && fill !== "white")
                            el.setAttribute("fill", "#1a1209");
                        if (stroke && stroke !== "none")
                            el.setAttribute("stroke", "#1a1209");
                    });
                }

            } catch (err) {
                scoreDiv.innerHTML = "<div class='error-msg'>⚠ Render error:\n" + err.message + "\n\n" + err.stack + "</div>";
                console.error(err);
            }
        });

        // ─────────────────────────────────────────────
        // 2. AUDIO PLAYBACK
        // BPM = 129 → 8th note = 60/129*0.5 ≈ 0.233s
        // ─────────────────────────────────────────────
        const BPM = 129;
        const E = (60 / BPM) * 0.5;   // 8th
        const S = E / 2;               // 16th
        const Ed = E * 1.5;            // dotted 8th

        // Full melody sequence from the score
        const SEQUENCE = [
            // Pickup
            { note: "A4",  dur: E },
            // Bar 1 (repeat section)
            { note: "D5",  dur: E }, { note: "C5",  dur: E }, { note: "A4",  dur: E }, { note: "F4",  dur: E },
            // Bar 2
            { note: "D5",  dur: E }, { note: "C5",  dur: E }, { note: "A4",  dur: E }, { note: "F4",  dur: E },
            // Bar 3 (F - Dm)
            { note: "A4",  dur: E }, { note: "C5",  dur: E }, { note: "D5",  dur: E }, { note: "A4",  dur: E },
            // Bar 4 (C) - to bà làm chổi
            { note: "G4",  dur: E }, { note: "G4",  dur: E }, { note: "A4",  dur: E }, { note: "Bb4", dur: E },
            // Bar 5 (Dm) - nhỏ Chổi to
            { note: "C5",  dur: E }, { note: "A4",  dur: E }, { note: "A4",  dur: E }, { note: "C5",  dur: E },
            // Bar 6 (Gm) - chổi
            { note: "D5",  dur: E }, { note: "C5",  dur: E }, { note: "A4",  dur: E }, { note: "G4",  dur: E },
            // Bar 7 - to bà quét sân
            { note: "F4",  dur: E }, { note: "G4",  dur: E }, { note: "A4",  dur: E }, { note: "C5",  dur: E },
            // Bar 8 - kho ấy còn chổi nhỏ bà
            { note: "A4",  dur: S }, { note: "Bb4", dur: S }, { note: "A4",  dur: E }, { note: "G4",  dur: E }, { note: "F4",  dur: E }, { note: "E4",  dur: E },
            // Bar 9 - để dành
            { note: "F4",  dur: E }, { note: "G4",  dur: E },
            // Bar 10 (C) - bé chăm lo quét
            { note: "A4",  dur: E }, { note: "C5",  dur: E }, { note: "C5",  dur: S }, { note: "D5",  dur: S },
            // 1st ending: nhà
            { note: "C5",  dur: Ed }, { note: "A4",  dur: S },
            // (would repeat from bar 1 — we just play 2nd ending)
            // 2nd ending: nhà.
            { note: "D5",  dur: E }, { note: "C5",  dur: E }, { note: "A4",  dur: E }, { note: "F4",  dur: E },
            { note: "A4",  dur: E }, { note: "C5",  dur: E }, { note: "D5",  dur: E }, { note: "A4",  dur: E },
            { note: "A4",  dur: E }, { note: "C5",  dur: E }, { note: "D5",  dur: E }, { note: "A4",  dur: E },
            { note: "G4",  dur: E }, { note: "G4",  dur: E }, { note: "A4",  dur: E }, { note: "Bb4", dur: E },
            { note: "C5",  dur: E }, { note: "A4",  dur: E }, { note: "A4",  dur: E }, { note: "C5",  dur: E },
            { note: "D5",  dur: E }, { note: "C5",  dur: E }, { note: "A4",  dur: E }, { note: "G4",  dur: E },
            { note: "F4",  dur: E }, { note: "G4",  dur: E }, { note: "A4",  dur: E }, { note: "C5",  dur: E },
            { note: "A4",  dur: S }, { note: "Bb4", dur: S }, { note: "A4",  dur: E }, { note: "G4",  dur: E }, { note: "F4",  dur: E }, { note: "E4",  dur: E },
            { note: "F4",  dur: E }, { note: "G4",  dur: E },
            { note: "A4",  dur: E }, { note: "C5",  dur: E }, { note: "C5",  dur: S }, { note: "D5",  dur: S },
            { note: "C5",  dur: Ed * 2 },
        ];

        function buildSynth(instrument) {
            switch (instrument) {
                case "piano":
                    return new Tone.Synth({
                        oscillator: { type: "triangle" },
                        envelope: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 1.2 },
                        volume: -6
                    }).toDestination();
                case "violin":
                    return new Tone.Synth({
                        oscillator: { type: "sawtooth" },
                        envelope: { attack: 0.12, decay: 0.1, sustain: 0.85, release: 0.6 },
                        volume: -8
                    }).toDestination();
                case "guitar":
                    return new Tone.PluckSynth({
                        attackNoise: 1, dampening: 4000, resonance: 0.97, volume: -4
                    }).toDestination();
                case "cello":
                    return new Tone.Synth({
                        oscillator: { type: "sawtooth" },
                        envelope: { attack: 0.18, decay: 0.15, sustain: 0.8, release: 0.9 },
                        volume: -6
                    }).toDestination();
                case "vocal":
                    const vocalSynth = new Tone.FMSynth({
                        harmonicity: 3, modulationIndex: 10,
                        oscillator: { type: "sine" },
                        envelope: { attack: 0.2, decay: 0.1, sustain: 0.9, release: 2 },
                        modulation: { type: "square" },
                        modulationEnvelope: { attack: 0.1, decay: 0.2, sustain: 0.6, release: 1 },
                        volume: -10
                    });
                    const vibratoNode = new Tone.Vibrato(5.5, 0.15);
                    const reverbNode = new Tone.Reverb(1.5).toDestination();
                    vocalSynth.connect(vibratoNode);
                    vibratoNode.connect(reverbNode);
                    return vocalSynth;
                default:
                    return new Tone.Synth().toDestination();
            }
        }

        let currentInstrument = "piano";
        let synth = null;
        let playbackTimeouts = [];
        let isPlaying = false;

        document.querySelectorAll(".inst-btn").forEach(btn => {
            btn.addEventListener("click", function () {
                if (isPlaying) return;
                document.querySelectorAll(".inst-btn").forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                currentInstrument = this.dataset.inst;
            });
        });

        document.getElementById("playBtn").addEventListener("click", async function () {
            if (isPlaying) return;
            await Tone.start();
            if (synth) { try { synth.dispose(); } catch (e) {} synth = null; }
            synth = buildSynth(currentInstrument);

            isPlaying = true;
            document.getElementById("playBtn").disabled = true;
            document.getElementById("stopBtn").disabled = false;
            document.querySelectorAll(".inst-btn").forEach(b => b.style.pointerEvents = "none");

            const statusEl = document.getElementById("statusText");
            statusEl.textContent = "Đang phát...";

            let elapsed = 0;
            playbackTimeouts = [];

            SEQUENCE.forEach(function (item) {
                const t = elapsed;
                const d = item.dur;
                elapsed += d;
                const tid = setTimeout(function () {
                    if (!isPlaying) return;
                    try {
                        if (currentInstrument === "guitar") {
                            synth.triggerAttack(item.note, Tone.now());
                        } else {
                            synth.triggerAttackRelease(item.note, d * 0.88, Tone.now());
                        }
                    } catch (e) { console.warn("Note error:", e); }
                    statusEl.textContent = item.note;
                }, t * 1000);
                playbackTimeouts.push(tid);
            });

            const endTid = setTimeout(function () {
                stopPlayback();
                statusEl.textContent = "Hoàn thành ✓";
                setTimeout(() => { if (!isPlaying) statusEl.textContent = "Sẵn sàng"; }, 1800);
            }, elapsed * 1000 + 200);
            playbackTimeouts.push(endTid);
        });

        document.getElementById("stopBtn").addEventListener("click", function () {
            stopPlayback();
            document.getElementById("statusText").textContent = "Đã dừng";
            setTimeout(() => { if (!isPlaying) document.getElementById("statusText").textContent = "Sẵn sàng"; }, 1200);
        });

        function stopPlayback() {
            isPlaying = false;
            playbackTimeouts.forEach(clearTimeout);
            playbackTimeouts = [];
            if (synth) {
                try {
                    if (synth.releaseAll) synth.releaseAll();
                    else if (synth.triggerRelease) synth.triggerRelease(Tone.now());
                } catch (e) {}
            }
            document.getElementById("playBtn").disabled = false;
            document.getElementById("stopBtn").disabled = true;
            document.querySelectorAll(".inst-btn").forEach(b => b.style.pointerEvents = "");
        }
    </script>
</body>
